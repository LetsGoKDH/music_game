<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>엠준위 Music Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="start-page" class="page active">
    <h1 class="title">엠준위 Music Quiz</h1>
    <p class="subtitle">노래 맞히기 진행용</p>

    <div class="team-setup">
      <h2>팀 설정</h2>
      <p class="team-setup-note">5팀 고정 · 팀명만 수정</p>
      <div id="team-names" class="team-names"></div>
    </div>

    <div class="song-info">
      <p>남은 곡 <span id="remaining-songs">0</span> / <span id="total-songs">0</span></p>
    </div>

    <div class="start-actions">
      <button id="btn-start" class="btn btn-start" type="button">YouTube 로딩 중...</button>
      <button id="btn-reset" class="btn btn-reset" type="button">곡 목록 리셋</button>
    </div>
  </div>

  <div id="game-page" class="page">
    <div class="game-header">
      <div class="timer" id="timer">3:00</div>
      <div class="song-counter">
        재생 곡 <span id="game-song-count">0</span>
      </div>
    </div>

    <div class="current-turn" id="current-turn">
      <span class="turn-label">현재 차례</span>
      <div class="turn-team-wrap">
        <span class="turn-team" id="turn-team-name">팀 1</span>
        <span class="turn-score" id="turn-team-score">0점</span>
      </div>
    </div>

    <div id="player-container">
      <div id="youtube-player"></div>
    </div>

    <div class="host-song-panel">
      <p class="host-label">진행자 확인용 현재 곡</p>
      <p id="song-title" class="host-song-title">-</p>
      <p id="song-artist" class="host-song-artist">-</p>
    </div>

    <div class="now-playing">
      <div id="music-visual" class="music-visual">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <p id="playing-status">대기 중</p>
    </div>

    <div class="game-controls">
      <button id="btn-replay" class="btn btn-replay" type="button">Replay</button>
      <button id="btn-next" class="btn btn-next" type="button">정답 처리</button>
      <button id="btn-pass" class="btn btn-pass" type="button">Pass (<span id="pass-count">3</span>)</button>
    </div>

    <div class="scoreboard">
      <h3>팀 점수</h3>
      <div id="scoreboard-teams" class="scoreboard-teams"></div>
    </div>

    <button id="btn-end" class="btn btn-end" type="button">게임 종료</button>
  </div>

  <div id="result-page" class="page">
    <h1 class="title">게임 결과</h1>
    <div id="final-scores" class="final-scores"></div>
    <div class="result-actions">
      <button id="btn-home" class="btn btn-start" type="button">처음으로</button>
    </div>
  </div>

  <script src="songs.js"></script>
  <script src="app.js"></script>
</body>
</html>
